name: Auto-merge Dependabot PRs

# Security design:
#
# 1. 7-day cooldown (dependabot.yml) — Dependabot venter 7 dager etter publisering
#    før den lager PR. De fleste supply chain-angrep oppdages innen denne perioden.
#
# 2. Restriktivt omfang:
#    - Patch-oppdateringer (alle avhengigheter) → auto-merge
#    - Minor-oppdateringer (kun dev-avhengigheter) → auto-merge
#    - Minor-oppdateringer (produksjonsavhengigheter) → manuell review
#    - Major-oppdateringer → alltid manuell review
#
# 3. Aktørverifisering — Kjører kun for dependabot[bot].
#
# 4. CI må bestå — --auto flagget venter på alle påkrevde statuskontroller
#    (krever branch protection med required status checks).
#
# 5. Squash merge — Gjør det enkelt å rulle tilbake ved behov.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # ratchet:dependabot/fetch-metadata@v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Determine auto-merge eligibility
        id: eligible
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' &&
           steps.metadata.outputs.dependency-type == 'direct:development')
        run: echo "result=true" >> "$GITHUB_OUTPUT"

      - name: Approve PR
        if: steps.eligible.outputs.result == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.eligible.outputs.result == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
