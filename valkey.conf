# Valkey-konfigurasjon for pensjon-revisjon
# Brukes som distribuert cache for mellomlagring av UNIFIED_AUDIT_TRAIL-data.
# Referanser:
#   https://valkey.io/topics/valkey.conf/
#   https://www.percona.com/blog/valkey-redis-configuration-best-practices/

################################## NETWORK #####################################
# Reduser fra default 300s for raskere oppdagelse av døde koblinger
tcp-keepalive 30

################################ SNAPSHOTTING  ################################
# Persistens skrudd av — Valkey brukes utelukkende som cache
save ""

############################## MEMORY MANAGEMENT ##############################
# Pod-limit er 128Mi. maxmemory settes til 80mb for å gi 48MB headroom til
# Valkey-prosessen selv (~5-10MB) og andre containere i podden.
# Dette hindrer at Kubernetes OOM-killer dreper podden når cachen er full.
# allkeys-lru evikterer Least Recently Used nøkler proaktivt ved 80mb-grensen,
# selv om nøklene har en TTL satt.
maxmemory 80mb
maxmemory-policy allkeys-lru
