apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  labels:
    team: pensjondeployer
  annotations:
    "nais.io/run-as-group": "0"
    "nais.io/read-only-file-system": "false"
  name: pensjon-pen-valkey
  namespace: pensjondeployer
spec:
  image: {{image}}
  port: 6379
  replicas:
    max: 1
    min: 1
  resources:
    limits:
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 128Mi
  accessPolicy:
    inbound:
      rules:
        - application: pensjon-pen
  service:
    port: 6379
    protocol: redis
  envFrom:
    - secret: pensjon-pen-valkey
